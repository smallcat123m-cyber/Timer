<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="../src/output.css">

    <style>
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .blink {
            animation: blink 3s infinite;
        }
    </style>
</head>

<body class="bg-black flex items-center justify-center h-screen">

    <div class="text-center w-full max-w-xl px-4">
        <h1 class="text-5xl font-bold text-yellow-500 mb-6">YOU HAVE A TIME </h1>  

        <div id="timer" class="text-9xl font-mono text-blue-500 mb-6">
            02:00:00
        </div>

        <div class="w-full bg-gray-700 rounded-full h-4 mb-8 overflow-hidden">
            <div id="progress" class="bg-orange-500 h-4 w-full"></div>
        </div>

        <div class="space-x-4">
            <button onclick="startTimer()" class="bg-green-500 px-6 py-2 rounded-xl text-white">
                Start
            </button>

            <button onclick="pauseTimer()" class="bg-yellow-500 px-6 py-2 rounded-xl text-white">
                Pause
            </button>

            <button onclick="resetTimer()" class="bg-red-500 px-6 py-2 rounded-xl text-white">
                Reset
            </button>
        </div>
    </div>

<script>
    // let min =31;
    let totalSeconds = 2 *60 *60;
    let maxSeconds = totalSeconds;
    let timerInterval = null;

    let lastAlertMark = null;
    let visualAlertActive = false;

    function updateDisplay() {
        let hours = Math.floor(totalSeconds / 3600);
        let minutes = Math.floor((totalSeconds % 3600) / 60);
        let seconds = totalSeconds % 60;

        let timer = document.getElementById("timer");
        let progress = document.getElementById("progress");

        timer.innerText =
            String(hours).padStart(2, '0') + ":" +
            String(minutes).padStart(2, '0') + ":" +
            String(seconds).padStart(2, '0');

        let percent = (totalSeconds / maxSeconds) * 100;
        progress.style.width = percent + "%";

        
    

        // 🔴 permanent warning at 15 min
        if (totalSeconds <= 900) {
            timer.classList.add("text-blue-500", "blink");
            timer.classList.remove("text-blue-400");
            return;
        }

        // 🟡 temporary 30-min alert (blink for few seconds)
        if (visualAlertActive) {
            timer.classList.add("text-blue-500", "blink");
            timer.classList.remove("text-blue-400");
        } else {
            timer.classList.remove("text-red-500", "blink");
            timer.classList.add("text-blue-400");
        }
    }

    function triggerVisualAlert() {
        visualAlertActive = true;
        updateDisplay();

        // stop blinking after 5 seconds
        setTimeout(() => {
            visualAlertActive = false;
            updateDisplay();
        }, 15000);
    }

    function saveTimer() {
        const endTime = Date.now() + totalSeconds * 1000;
        localStorage.setItem("endTime", endTime);
    }

    function startTimer() {
        if (timerInterval !== null) return;

        saveTimer();

        timerInterval = setInterval(() => {
            const endTime = localStorage.getItem("endTime");
            if (!endTime) return;

            let remaining = Math.floor((endTime - Date.now()) / 1000);

            if (remaining > 0) {
                totalSeconds = remaining;

                // 🔔 every 30 minutes → visual alert
                if (totalSeconds % 1800 === 0 && totalSeconds !== 0) {
                    if (lastAlertMark !== totalSeconds) {
                        triggerVisualAlert();
                        lastAlertMark = totalSeconds;
                    }
                }

                updateDisplay();

            } else {
                clearInterval(timerInterval);
                timerInterval = null;
                localStorage.removeItem("endTime");

                // final alert
                visualAlertActive = true;
                updateDisplay();
                alert("⏰ Time's up!");
            }
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        localStorage.removeItem("endTime");
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;

        localStorage.removeItem("endTime");

        totalSeconds = 2 * 60 * 60;
        maxSeconds = totalSeconds;
        lastAlertMark = null;
        visualAlertActive = false;

        updateDisplay();
    }

    window.onload = function () {
        const endTime = localStorage.getItem("endTime");

        if (endTime) {
            let remaining = Math.floor((endTime - Date.now()) / 1000);

            if (remaining > 0) {
                totalSeconds = remaining;
                maxSeconds = remaining;
                startTimer();
            } else {
                localStorage.removeItem("endTime");
            }
        }

        updateDisplay();
    };
</script>

</body>
</html>
